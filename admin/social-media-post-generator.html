<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Tiger Tank Malaysia</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/nav.css">
	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/main.css">
	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/logos.css">
	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/footer.css">
	<link rel="stylesheet" type="text/css" media="screen" href="./social-media-post-generator.css">

	<script src="../scripts/load-navigation-bar.js" type="module" defer></script>
	<script src="../scripts/load-footer-bar.js" type="module" defer></script>
	<script src="./social-media-post-generator.js" type="module" defer></script>
</head>
<body>
	<nav></nav>
	<main>
	<div id="user-input-container">
		<div id="text-input-container">
			<label for="text-input">Text to post:</label>
			<textarea type="text" id="text-input">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</textarea>
		</div>

		<div id="font-family-url-input-container">
			<label for="font-family-url-input">URL of font family:</label>
			<input type="url" id="font-family-url-input" min="1">
			<div>
				<span>Detected font family: </span><span id="detected-font-family"></span>
			</div>
		</div>

		<div>
			<label for="font-size-input">Font size:</label>
			<input type="number" id="font-size-input" min="1">
		</div>

		<div>
			<label for="line-height-multiplier-input">Line height multiplier:</label>
			<input type="number" id="line-height-multiplier-input" min="1" step="0.01">
		</div>

		<div>
			<label for="horizontal-padding-input">Horizontal padding:</label>
			<input type="number" id="horizontal-padding-input" min="0">
		</div>
		<div>
			<label for="horizontal-padding-input">Vertical padding:</label>
			<input type="number" id="vertical-padding-input" min="0">
		</div>


		<div>
			<label for="width-input">Image width:</label>
			<input type="number" id="width-input" min="1">
		</div>
		<div>
			<label for="height-input">Image height:</label>
			<input type="number" id="height-input" min="1">
		</div>
	</div>
	<canvas></canvas>
	</main>
	<footer></footer>
</body>
</html>
