<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Tiger Tank Malaysia</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/nav.css">
	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/main.css">
	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/logos.css">
	<link rel="stylesheet" type="text/css" media="screen" href="../stylesheets/footer.css">
	<link rel="stylesheet" type="text/css" media="screen" href="./social-media-post-generator.css">

	<!-- web font loader https://github.com/typekit/webfontloader -->
	<script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="module" defer></script>
	<script src="./social-media-post-generator.js" type="module" defer></script>
</head>
<body>
	<main>
	<div id="prelude-container">
		<h1>Social media post generator</h1>
		<p>A paragraph (paragraphs are separated by newlines) that does not fit on one image will automatically be moved to the next. Paragraphs that begin with a hashtag (#) character will be interpreted as headings.</p>
		<p>Fonts are loaded from <a href="https://fonts.google.com/">Google Fonts</a>.</p>
		<button id="download-button">Download images</button>
	</div>
	<div id="user-input-container">
		<div id="text-input-container">
			<label for="text-input">Text to post:</label>
			<textarea type="text" id="text-input">
			</textarea>
		</div>

		<div id="font-family-input-container">
			<label for="font-family-input">Font family:</label>
			<input type="text" id="font-family-input" min="1">
			<span id="font-family-load-status"></span>
		</div>

		<div>
			<label for="font-size-input">Font size:</label>
			<input type="number" id="font-size-input" min="1">
		</div>

		<div>
			<label for="line-height-multiplier-input">Line height multiplier:</label>
			<input type="number" id="line-height-multiplier-input" min="1" step="0.01">
		</div>

		<div>
			<label for="paragraph-spacing-input">Spacing between paragraphs:</label>
			<input type="number" id="paragraph-spacing-input" min="1" step="1">
		</div>

		<div>
			<label for="horizontal-padding-input">Horizontal padding:</label>
			<input type="number" id="horizontal-padding-input" min="0">
		</div>
		<div>
			<label for="horizontal-padding-input">Vertical padding:</label>
			<input type="number" id="vertical-padding-input" min="0">
		</div>


		<!-- hide these for now because background image uploading functionality has not been implemented yet -->
		<div style="display: none;">
			<label for="image-width-input">Image width:</label>
			<input type="number" id="image-width-input" min="1">
		</div>
		<div style="display: none;">
			<label for="image-height-input">Image height:</label>
			<input type="number" id="image-height-input" min="1">
		</div>
	</div>
	<div id="canvas-container">
		<canvas></canvas>
	</div>
	</main>
</body>
</html>
